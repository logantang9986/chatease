<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatEase</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: transparent; /* Transparent background */
            display: flex;
            justify-content: center;
            align-items: center;
        }
        img {
            /* Adjust size as needed, assuming the image is high-res */
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            /* Optional: Add a subtle shadow to the image itself if the window is transparent */
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.2));
        }
    </style>
</head>
<body>
    <img src="./splash.png" alt="ChatEase">
</body>
</html>
